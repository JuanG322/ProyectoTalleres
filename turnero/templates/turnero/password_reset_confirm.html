<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva contraseña</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen flex flex-col items-center justify-center font-sans">

    <div class="w-full max-w-md flex flex-col items-center">
        <h1 class="text-4xl font-bold text-blue-700 mb-8">Empresa de Salud</h1>

        <div class="bg-white border border-gray-300 rounded-lg shadow-sm p-8 w-full">
            <h2 class="text-3xl font-semibold text-center text-gray-800 mb-6">Nueva contraseña</h2>

            {% if validlink %}
                <p class="text-sm text-gray-600 text-center mb-6">
                    Escribe tu nueva contraseña y confírmala para actualizar el acceso a tu cuenta.
                </p>

                <form method="post" class="flex flex-col gap-5">
                    {% csrf_token %}

                    <div class="flex flex-col gap-1">
                        <label for="id_new_password1" class="text-sm text-gray-700 ml-1 font-medium">Nueva contraseña</label>
                        <input
                            type="password"
                            name="new_password1"
                            id="id_new_password1"
                            required
                            class="w-full border border-gray-300 rounded-full px-4 py-3 outline-none focus:ring-2 focus:ring-blue-400"
                        >
                    </div>

                    <div class="flex flex-col gap-1">
                        <label for="id_new_password2" class="text-sm text-gray-700 ml-1 font-medium">Confirmar contraseña</label>
                        <input
                            type="password"
                            name="new_password2"
                            id="id_new_password2"
                            required
                            class="w-full border border-gray-300 rounded-full px-4 py-3 outline-none focus:ring-2 focus:ring-blue-400"
                        >
                    </div>

                    <button
                        type="submit"
                        class="bg-blue-700 hover:bg-blue-500 text-white font-medium py-3 px-6 rounded-full transition-colors"
                    >
                        Guardar nueva contraseña
                    </button>
                </form>
            {% else %}
                <div class="text-center">
                    <p class="text-sm text-red-600 mb-6">
                        El enlace no es válido o ya expiró.
                    </p>

                    <a
                        href="{% url 'password_reset' %}"
                        class="inline-block bg-blue-700 hover:bg-blue-500 text-white font-medium py-3 px-6 rounded-full transition-colors"
                    >
                        Solicitar otro enlace
                    </a>
                </div>
            {% endif %}
        </div>
    </div>

</body>
</html>
