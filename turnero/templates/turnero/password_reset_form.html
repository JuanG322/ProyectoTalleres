<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen flex flex-col items-center justify-center font-sans transition-colors duration-300 relative">

    <div class="w-full max-w-md flex flex-col items-center">
        <h1 class="text-4xl font-bold text-blue-700 mb-8">Empresa de Salud</h1>

        <div class="bg-white border border-gray-300 rounded-lg shadow-sm p-8 w-full">
            <h2 class="text-3xl font-semibold text-center text-gray-800 mb-6">Recuperar contraseña</h2>

            <p class="text-sm text-gray-600 text-center mb-6">
                Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.
            </p>

            <form method="post" class="flex flex-col gap-5">
                {% csrf_token %}

                <div class="flex flex-col gap-1">
                    <label for="id_email" class="text-sm text-gray-700 ml-1 font-medium">Correo electrónico</label>
                    <input
                        type="email"
                        name="email"
                        id="id_email"
                        required
                        placeholder="ejemplo@empresa.com"
                        class="w-full border border-gray-300 rounded-full px-4 py-3 outline-none focus:ring-2 focus:ring-blue-400"
                    >
                </div>

                <button
                    type="submit"
                    class="bg-blue-700 hover:bg-blue-500 text-white font-medium py-3 px-6 rounded-full transition-colors"
                >
                    Enviar enlace
                </button>
            </form>

            <div class="text-center mt-6 text-sm text-gray-600">
                <a href="/" class="text-blue-600 hover:underline">Volver al inicio de sesión</a>
            </div>
        </div>
    </div>

</body>
</html>
