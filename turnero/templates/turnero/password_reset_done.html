<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correo enviado</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen flex flex-col items-center justify-center font-sans">

    <div class="w-full max-w-md flex flex-col items-center">
        <h1 class="text-4xl font-bold text-blue-700 mb-8">Empresa de Salud</h1>

        <div class="bg-white border border-gray-300 rounded-lg shadow-sm p-8 w-full text-center">
            <h2 class="text-3xl font-semibold text-gray-800 mb-6">Revisa tu correo</h2>

            <p class="text-sm text-gray-600 leading-6 mb-6">
                Si el correo ingresado existe en el sistema, te enviamos un enlace para restablecer tu contraseña.
            </p>

            <a
                href="/"
                class="inline-block bg-blue-700 hover:bg-blue-500 text-white font-medium py-3 px-6 rounded-full transition-colors"
            >
                Volver al inicio de sesión
            </a>
        </div>
    </div>

</body>
</html>
